<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Dashboard - Molusca Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center border-b-4 border-blue-600">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Dashboard Bos & Lead</h1>
            <p class="text-sm text-gray-500">PT Dakreativ Digital Media - Pantau Kinerja Harian</p>
        </div>
        <div class="text-right">
            <div id="current-date" class="font-semibold text-blue-700"></div>
            <div class="text-xs bg-gray-200 px-2 py-1 rounded mt-1 inline-block">Hak Akses: Lead / Bos</div>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto space-y-8">
        
        <section class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Berikan Tugas Harian Baru
            </h2>
            <form id="taskForm" class="flex flex-wrap gap-4 items-end">
                <div class="flex-grow min-w-[250px]">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nama Project / Desain</label>
                    <input type="text" id="taskTitle" required placeholder="Contoh: Banner Promo Liefdey" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="w-48">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tugaskan Ke</label>
                    <select id="assignee" required class="w-full border border-gray-300 rounded-lg p-2.5 bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="Indah">Indah</option>
                        <option value="Nayla">Nayla</option>
                        <option value="Tya">Tya</option>
                    </select>
                </div>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-lg transition shadow-md">
                    Input Kerjaan
                </button>
            </form>
        </section>

        <section>
            <h2 class="text-xl font-bold mb-6 border-b pb-2">Papan Pekerjaan Tim Hari Ini</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="bg-gray-100 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-lg text-center mb-4 pb-2 border-b-2 border-pink-400">Tim: INDAH</h3>
                    <div id="board-indah" class="space-y-4"></div>
                </div>

                <div class="bg-gray-100 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-lg text-center mb-4 pb-2 border-b-2 border-purple-400">Tim: NAYLA</h3>
                    <div id="board-nayla" class="space-y-4"></div>
                </div>

                <div class="bg-gray-100 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-lg text-center mb-4 pb-2 border-b-2 border-teal-400">Tim: TYA</h3>
                    <div id="board-tya" class="space-y-4"></div>
                </div>

            </div>
        </section>

    </main>

    <script>
        // Set Tanggal Hari Ini
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', options);

        // Data Storage
        let dailyTasks = JSON.parse(localStorage.getItem('dailyTasks')) || [];

        function saveTasks() {
            localStorage.setItem('dailyTasks', JSON.stringify(dailyTasks));
            renderBoard();
        }

        // Form Submit
        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Generate Jam Otomatis saat tugas dibuat
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            const newTask = {
                id: Date.now(),
                title: document.getElementById('taskTitle').value,
                assignee: document.getElementById('assignee').value,
                timeAssigned: timeString, // Jam masuk otomatis
                status: 'Lagi Dikerjain' // Status default
            };

            dailyTasks.push(newTask);
            saveTasks();
            document.getElementById('taskTitle').value = ''; // Reset form
        });

        // Update Status
        function updateStatus(taskId, newStatus) {
            const index = dailyTasks.findIndex(t => t.id === taskId);
            if(index !== -1) {
                dailyTasks[index].status = newStatus;
                saveTasks();
            }
        }

        // Hapus Tugas (Opsional untuk Bos/Lead)
        function deleteTask(taskId) {
            if(confirm("Hapus tugas ini dari papan?")) {
                dailyTasks = dailyTasks.filter(t => t.id !== taskId);
                saveTasks();
            }
        }

        // Render Papan Kerja
        function renderBoard() {
            const boards = {
                'Indah': document.getElementById('board-indah'),
                'Nayla': document.getElementById('board-nayla'),
                'Tya': document.getElementById('board-tya')
            };

            // Kosongkan semua papan
            Object.values(boards).forEach(board => board.innerHTML = '');

            dailyTasks.forEach(task => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition relative";
                
                // Warna indikator berdasarkan status
                let statusColor = "text-blue-600 bg-blue-50";
                if(task.status === 'Tinggal Layout') statusColor = "text-orange-600 bg-orange-50";
                if(task.status === 'Udh Final') statusColor = "text-green-600 bg-green-50";

                card.innerHTML = `
                    <button onclick="deleteTask(${task.id})" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 text-sm">✖</button>
                    <div class="text-xs text-gray-500 font-medium mb-1">⏰ Masuk: ${task.timeAssigned} WIB</div>
                    <h4 class="font-bold text-gray-800 mb-3 pr-4">${task.title}</h4>
                    
                    <div class="border-t pt-3 mt-2">
                        <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1">Update Status:</label>
                        <select onchange="updateStatus(${task.id}, this.value)" class="w-full text-sm font-semibold rounded p-1.5 border outline-none cursor-pointer ${statusColor}">
                            <option value="Lagi Dikerjain" ${task.status === 'Lagi Dikerjain' ? 'selected' : ''}>⏳ Lagi Dikerjain</option>
                            <option value="Tinggal Layout" ${task.status === 'Tinggal Layout' ? 'selected' : ''}>🧩 Tinggal Layout</option>
                            <option value="Udh Final" ${task.status === 'Udh Final' ? 'selected' : ''}>✅ Udh Final</option>
                        </select>
                    </div>
                `;
                
                // Masukkan card ke kolom tim yang sesuai
                if(boards[task.assignee]) {
                    boards[task.assignee].appendChild(card);
                }
            });
        }

        // Jalankan render saat pertama buka halaman
        renderBoard();
    </script>
</body>
</html>
