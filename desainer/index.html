<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PT Dakreativ Digital Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border-t-4 border-blue-600">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-gray-900">Dakreativ Portal</h1>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Designer Task System</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Username</label>
                <input type="text" id="username" required placeholder="admin / indah / nayla / tya" class="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-100 transition lowercase">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full border border-gray-300 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-100 transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-100">MASUK</button>
        </form>
        
        <div class="mt-8 p-4 bg-gray-50 rounded-xl border border-dashed border-gray-300 text-[10px] text-gray-500 text-center">
            <p class="font-bold mb-1 uppercase tracking-tighter">Default Access:</p>
            <p>Admin ➔ admin / admin123</p>
            <p>Team ➔ name / user123</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.toLowerCase().trim();
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('dakreativUser', 'admin');
                window.location.href = 'dashboard.html';
            } 
            else if ((user === 'indah' || user === 'nayla' || user === 'tya') && pass === 'user123') {
                const formattedName = user.charAt(0).toUpperCase() + user.slice(1);
                localStorage.setItem('dakreativUser', formattedName);
                window.location.href = 'desainer.html';
            } 
            else {
                alert('Username atau Password salah!');
            }
        });
    </script>
</body>
</html>
