<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PT Dakreativ Digital Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-white p-10 rounded-[32px] shadow-sm border border-gray-100">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Dakreativ<span class="text-blue-600">.</span></h1>
            <p class="text-slate-400 text-sm mt-2 font-medium uppercase tracking-[0.2em]">Management System</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Username</label>
                <input type="text" id="username" required placeholder="admin / indah / nayla / tya" class="w-full bg-slate-50 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700 lowercase">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full bg-slate-50 border-none rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all text-slate-700">
            </div>
            <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-slate-200 uppercase text-sm tracking-widest">Sign In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.toLowerCase().trim();
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('dakreativUser', 'admin');
                window.location.href = 'dashboard.html';
            } 
            else if (['indah', 'nayla', 'tya'].includes(user) && pass === 'user123') {
                const formattedName = user.charAt(0).toUpperCase() + user.slice(1);
                localStorage.setItem('dakreativUser', formattedName);
                window.location.href = 'desainer.html';
            } 
            else {
                alert('Akses ditolak. Cek kembali username & password.');
            }
        });
    </script>
</body>
</html>
