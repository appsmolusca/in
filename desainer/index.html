<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Molusca</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm border-t-4 border-blue-600 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-24 h-24 bg-blue-100 rounded-full opacity-50"></div>
        
        <div class="text-center mb-8 relative z-10">
            <h1 class="text-2xl font-extrabold text-gray-900 mb-1">Molusca Portal</h1>
            <p class="text-sm text-gray-500">Sistem Manajemen Desainer</p>
        </div>
        
        <form id="loginForm" class="space-y-5 relative z-10">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required placeholder="Masukkan username..." class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 lowercase transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full border border-gray-300 rounded-lg p-3 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-md mt-2">Masuk</button>
        </form>
        
        <div class="mt-6 p-3 bg-gray-50 rounded-lg border border-dashed border-gray-300 text-xs text-gray-500 text-center">
            <p class="font-bold mb-1 text-gray-600">Info Akses Akun:</p>
            <p>Admin/Lead ➔ User: <b>admin</b> | Pass: <b>admin123</b></p>
            <p>Desainer ➔ User: <b>indah/nayla/tya</b> | Pass: <b>user123</b></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.toLowerCase().trim();
            const pass = document.getElementById('password').value;

            // Logika Login Sederhana
            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('dakreativUser', 'admin');
                window.location.href = 'dashboard.html';
            } 
            else if ((user === 'indah' || user === 'nayla' || user === 'tya') && pass === 'user123') {
                // Huruf pertama dikapitalkan (contoh: indah -> Indah)
                const formattedName = user.charAt(0).toUpperCase() + user.slice(1);
                localStorage.setItem('dakreativUser', formattedName);
                window.location.href = 'desainer.html';
            } 
            else {
                alert('⚠️ Username atau Password salah!');
            }
        });
    </script>

</body>
</html>
