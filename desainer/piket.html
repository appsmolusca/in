<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket & Kas - Molusca Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-user-select: none; user-select: none;
        }
    </style>
</head>
<body class="bg-[#FBFBFE] pb-20" onload="initApp()" oncontextmenu="return false;">
    <script>
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && ['c','u','s','p','a'].includes(e.key.toLowerCase())) e.preventDefault(); });

        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            authDomain: "appmoluscadesign.firebaseapp.com",
            databaseURL: "https://appmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appmoluscadesign",
            storageBucket: "appmoluscadesign.firebasestorage.app",
            messagingSenderId: "800709666958",
            appId: "1:800709666958:web:66f97b271f736e17c981df"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('moluscaUser');
        let isAdmin = currentUser === 'admin';

        // JADWAL PIKET FIX DARI KANG DADAN
        const jadwalPiket = {
            1: ['Indah'],        // Senin
            2: ['Nazma'],        // Selasa
            3: ['Nayla'],        // Rabu
            4: ['Feyy'],         // Kamis
            5: ['Dadan'],        // Jumat
            6: ['Tya', 'Opik'],  // Sabtu
            0: []                // Minggu Libur
        };

        const today = new Date();
        const dayIndex = today.getDay(); 
        const todayStr = today.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-');
        const dendaAmount = 5000;

        function initApp() {
            if (!currentUser) window.location.href = 'index.html';
            document.getElementById('tanggalHariIni').innerText = today.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            // Sembunyikan form kasbon dari admin (karena admin yg approve)
            if(isAdmin) document.getElementById('formKasbonArea').style.display = 'none';

            loadData();
        }

        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }

        function loadData() {
            // 1. Load Saldo Total Kas
            db.ref('kas_balance').on('value', snap => {
                let saldo = snap.val() || 0;
                document.getElementById('saldoKas').innerText = formatRupiah(saldo);
            });

            // 2. Load Absen Piket
            db.ref('piket_log/' + todayStr).on('value', snap => {
                renderPiket(snap.val() || {});
            });

            // 3. Load Kasbon (Pinjaman)
            db.ref('kasbon').on('value', snap => {
                const data = snap.val();
                renderKasbon(data ? Object.values(data) : []);
            });
        }

        // ================= PIKET LOGIC =================
        function absenPiket() {
            if(confirm("Absen piket sekarang? Pastikan sudah bersih-bersih ya!")) {
                db.ref(`piket_log/${todayStr}/${currentUser}`).set('sudah');
            }
        }

        function beriDenda(nama) {
            if(confirm(`Yakin beri denda Rp 5.000 ke ${nama}? Saldo kas akan otomatis bertambah.`)) {
                // Set status didenda
                db.ref(`piket_log/${todayStr}/${nama}`).set('denda');
                
                // Tambah saldo kas otomatis
                db.ref('kas_balance').once('value', snap => {
                    let current = snap.val() || 0;
                    db.ref('kas_balance').set(current + dendaAmount);
                });
            }
        }

        function batalDenda(nama) {
            if(confirm(`Batalkan denda untuk ${nama}? Saldo kas akan dikurangi 5.000.`)) {
                db.ref(`piket_log/${todayStr}/${nama}`).remove();
                db.ref('kas_balance').once('value', snap => {
                    let current = snap.val() || 0;
                    db.ref('kas_balance').set(current - dendaAmount);
                });
            }
        }

        function renderPiket(logData) {
            const list = document.getElementById('piket-list');
            list.innerHTML = '';
            
            const petugasHariIni = jadwalPiket[dayIndex];

            if (petugasHariIni.length === 0) {
                list.innerHTML = `<div class="text-center text-slate-400 font-bold text-xs p-4 bg-slate-50 rounded-2xl border border-dashed border-slate-200">Yeay, hari ini Libur! Tidak ada jadwal piket.</div>`;
                return;
            }

            petugasHariIni.forEach(name => {
                let status = logData[name];
                let actionUI = '';

                if (status === 'sudah') {
                    actionUI = `<span class="bg-green-100 text-green-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 border border-green-200"><i class="ph-fill ph-check-circle"></i> Selesai Piket</span>`;
                } else if (status === 'denda') {
                    let btnBatal = isAdmin ? `<button onclick="batalDenda('${name}')" class="ml-2 text-slate-400 hover:text-slate-600"><i class="ph-fill ph-arrow-counter-clockwise"></i></button>` : '';
                    actionUI = `<div class="flex items-center"><span class="bg-red-100 text-red-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 border border-red-200"><i class="ph-fill ph-money"></i> Masuk Kas (-5K)</span> ${btnBatal}</div>`;
                } else {
                    // Belum absen
                    if (currentUser === name) {
                        actionUI = `<button onclick="absenPiket()" class="bg-blue-500 hover:bg-blue-600 shadow-md text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 transition"><i class="ph-fill ph-broom"></i> Absen Piket</button>`;
                    } else if (isAdmin) {
                        actionUI = `<button onclick="beriDenda('${name}')" class="bg-red-500 hover:bg-red-600 shadow-md text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 transition"><i class="ph-fill ph-warning-circle"></i> Beri Denda 5rb</button>`;
                    } else {
                        actionUI = `<span class="bg-slate-100 text-slate-400 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Belum Absen</span>`;
                    }
                }

                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                        <h4 class="font-black text-slate-700 flex items-center gap-2"><i class="ph-fill ph-user-circle text-blue-500 text-2xl"></i> ${name}</h4>
                        ${actionUI}
                    </div>
                `;
            });
        }

        // ================= KASBON LOGIC =================
        async function ajukanKasbon(e) {
            e.preventDefault();
            const nominal = parseInt(document.getElementById('kbAmount').value);
            const alasan = document.getElementById('kbReason').value;
            const id = Date.now();
            
            db.ref('kasbon/' + id).set({
                id: id, name: currentUser, amount: nominal, reason: alasan,
                dateStr: todayStr, status: 'Menunggu'
            });
            document.getElementById('formKasbon').reset();
            alert("Pengajuan Kasbon terkirim! Menunggu persetujuan Admin.");
        }

        function setujuKasbon(id) {
            if(confirm("Setujui pinjaman ini?")) {
                db.ref(`kasbon/${id}`).update({status: 'Disetujui'});
            }
        }

        function tolakKasbon(id) {
            if(confirm("Tolak dan hapus pengajuan ini?")) {
                db.ref(`kasbon/${id}`).remove();
            }
        }

        function lunasKasbon(id) {
            if(confirm("Tandai kasbon ini LUNAS? Data akan diarsipkan/dihapus.")) {
                db.ref(`kasbon/${id}`).remove();
            }
        }

        function renderKasbon(data) {
            const list = document.getElementById('kasbon-list');
            list.innerHTML = '';
            
            if(data.length === 0) {
                list.innerHTML = `<div class="text-center p-6 bg-slate-50 rounded-2xl border border-dashed border-slate-200 text-slate-400 font-bold text-xs">Belum ada pengajuan kasbon.</div>`;
                return;
            }

            data.reverse().forEach(item => {
                let badge = ''; let adminBtns = '';

                if (item.status === 'Menunggu') {
                    badge = `<span class="bg-orange-100 text-orange-600 px-2 py-1 rounded text-[9px] font-black uppercase">⏳ Menunggu</span>`;
                    if (isAdmin) {
                        adminBtns = `
                        <div class="flex gap-2 w-full mt-3">
                            <button onclick="setujuKasbon('${item.id}')" class="flex-1 bg-green-500 text-white p-2 rounded-xl text-[10px] font-black uppercase"><i class="ph-fill ph-check"></i> Setuju</button>
                            <button onclick="tolakKasbon('${item.id}')" class="flex-1 bg-red-100 text-red-500 p-2 rounded-xl text-[10px] font-black uppercase">Tolak</button>
                        </div>`;
                    }
                } else if (item.status === 'Disetujui') {
                    badge = `<span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[9px] font-black uppercase">💸 Disetujui (Belum Lunas)</span>`;
                    if (isAdmin) {
                        adminBtns = `<button onclick="lunasKasbon('${item.id}')" class="w-full mt-3 bg-slate-900 text-white p-2 rounded-xl text-[10px] font-black uppercase flex justify-center items-center gap-1"><i class="ph-fill ph-seal-check"></i> Tandai Lunas</button>`;
                    }
                }

                list.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h4 class="font-black text-slate-900">${item.name}</h4>
                                <div class="text-[9px] font-bold text-slate-400 uppercase"><i class="ph ph-calendar-blank"></i> ${item.dateStr}</div>
                            </div>
                            ${badge}
                        </div>
                        <div class="text-xl font-black text-slate-800 tracking-tighter mb-1">${formatRupiah(item.amount)}</div>
                        <div class="text-xs text-slate-500 font-medium bg-slate-50 p-2 rounded-xl mb-1 italic">"${item.reason}"</div>
                        ${adminBtns}
                    </div>
                `;
            });
        }
    </script>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-6 border-b border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-hexagon text-2xl text-blue-600"></i>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight text-slate-900 leading-none">Molusca<span class="text-blue-600">.</span></h1>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Portal Keuangan</span>
            </div>
        </div>
        <button onclick="window.history.back()" class="text-[10px] font-black text-slate-600 bg-slate-100 px-3 py-2 rounded-xl uppercase hover:bg-slate-200 flex items-center gap-1"><i class="ph-fill ph-arrow-left"></i> KEMBALI</button>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-8 mt-2">
        
        <section class="bg-gradient-to-br from-blue-600 to-indigo-800 p-6 rounded-[32px] shadow-xl shadow-blue-200 text-white relative overflow-hidden">
            <i class="ph-fill ph-wallet absolute -right-4 -bottom-4 text-9xl text-white opacity-10"></i>
            <div class="relative z-10">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-200 mb-1">Total Saldo Kas Molusca</h3>
                <div id="saldoKas" class="text-4xl font-black tracking-tighter">Rp 0</div>
                <p class="text-[9px] mt-2 text-blue-100 bg-black/20 inline-block px-3 py-1 rounded-full"><i class="ph-fill ph-info"></i> Saldo bertambah otomatis dari denda piket</p>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-4 ml-1">
                <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest flex items-center gap-2"><i class="ph-fill ph-broom text-orange-500 text-xl"></i> Jadwal Piket Hari Ini</h2>
                <div id="tanggalHariIni" class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md"></div>
            </div>
            
            <div id="piket-list" class="space-y-3">
                </div>
        </section>

        <section id="formKasbonArea" class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <h2 class="text-xs font-black text-slate-900 uppercase tracking-widest mb-5 flex items-center gap-2"><i class="ph-fill ph-hand-coins text-green-500 text-lg"></i> Form Pengajuan Kasbon</h2>
            <form id="formKasbon" onsubmit="ajukanKasbon(event)" class="space-y-4">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">Rp</span>
                    <input type="number" id="kbAmount" required placeholder="Contoh: 50000" class="w-full bg-slate-50 border-none rounded-2xl py-4 pl-12 pr-4 text-slate-900 text-sm font-black outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>
                <div class="relative">
                    <i class="ph-fill ph-text-align-left absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="kbReason" required placeholder="Untuk keperluan apa?" autocomplete="off" class="w-full bg-slate-50 border-none rounded-2xl py-4 pl-10 pr-4 text-slate-900 text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>
                <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black py-4 rounded-2xl transition uppercase tracking-widest text-[10px] flex justify-center items-center gap-2 shadow-lg shadow-slate-200"><i class="ph-fill ph-paper-plane-right"></i> Ajukan ke Bos</button>
            </form>
        </section>

        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-1 flex items-center gap-2"><i class="ph-fill ph-receipt text-lg"></i> Riwayat & Status Kasbon</h2>
            <div id="kasbon-list" class="space-y-4">
                </div>
        </section>

    </main>
</body>
</html>
