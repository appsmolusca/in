<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket & Kas - Molusca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } </style>
</head>
<body class="bg-[#FBFBFE] pb-20" onload="initApp()" oncontextmenu="return false;">
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            authDomain: "appmoluscadesign.firebaseapp.com",
            databaseURL: "https://appmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appmoluscadesign",
            storageBucket: "appmoluscadesign.firebasestorage.app",
            messagingSenderId: "800709666958",
            appId: "1:800709666958:web:66f97b271f736e17c981df"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('moluscaUser');
        const jadwalPiket = { 1: ['Indah'], 2: ['Nazma'], 3: ['Nayla'], 4: ['Feyy'], 5: ['Dadan'], 6: ['Tya', 'Opik'], 0: [] };
        const todayStr = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-');
        const dayIndex = new Date().getDay();

        function initApp() {
            if (!currentUser || currentUser === 'admin') window.location.href = 'index.html';
            document.getElementById('tanggalHariIni').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            loadData();
        }

        function formatRupiah(angka) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka); }

        function loadData() {
            db.ref('piket_log/' + todayStr).on('value', snap => renderPiket(snap.val() || {}));
            db.ref('kasbon').on('value', snap => renderKasbon(snap.val() ? Object.values(snap.val()) : []));
        }

        function absenPiket() {
            if(confirm("Yakin sudah bersih-bersih ruang kerja?")) {
                db.ref(`piket_log/${todayStr}/${currentUser}`).set('sudah');
            }
        }

        async function ajukanKasbon(e) {
            e.preventDefault();
            const id = Date.now();
            db.ref('kasbon/' + id).set({
                id: id, name: currentUser, amount: parseInt(document.getElementById('kbAmount').value),
                reason: document.getElementById('kbReason').value, dateStr: todayStr, status: 'Menunggu'
            });
            document.getElementById('formKasbon').reset();
            alert("Kasbon terkirim! Silakan tunggu ACC Admin.");
        }

        function renderPiket(logData) {
            const list = document.getElementById('piket-list');
            list.innerHTML = '';
            const petugas = jadwalPiket[dayIndex];
            if (petugas.length === 0) { list.innerHTML = `<div class="text-center p-4 bg-slate-50 text-slate-400 font-bold text-xs rounded-2xl">Hari ini libur piket.</div>`; return; }

            petugas.forEach(name => {
                let status = logData[name];
                let ui = '';

                if (status === 'sudah') ui = `<span class="bg-green-100 text-green-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase"><i class="ph-fill ph-check-circle"></i> Selesai Piket</span>`;
                else if (status === 'denda') ui = `<span class="bg-red-100 text-red-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Didenda Admin</span>`;
                else {
                    if (currentUser === name) ui = `<button onclick="absenPiket()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-md"><i class="ph-fill ph-hand-pointing"></i> Klik Absen</button>`;
                    else ui = `<span class="bg-slate-100 text-slate-400 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Belum Absen</span>`;
                }

                list.innerHTML += `<div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center"><h4 class="font-black text-slate-700 flex items-center gap-2"><i class="ph-fill ph-user-circle text-blue-500 text-xl"></i> ${name}</h4>${ui}</div>`;
            });
        }

        function renderKasbon(data) {
            const list = document.getElementById('kasbon-list');
            list.innerHTML = '';
            const myKasbon = data.filter(k => k.name === currentUser);

            if(myKasbon.length === 0) { list.innerHTML = `<div class="text-center p-6 bg-slate-50 rounded-2xl text-slate-400 font-bold text-xs">Belum ada riwayat pengajuan.</div>`; return; }

            myKasbon.reverse().forEach(item => {
                let badge = item.status === 'Menunggu' ? `<span class="bg-orange-100 text-orange-600 px-2 py-1 rounded text-[9px] font-black uppercase">Menunggu ACC</span>` : `<span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[9px] font-black uppercase">Disetujui</span>`;
                list.innerHTML += `<div class="bg-white p-5 rounded-3xl border shadow-sm"><div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-slate-900">Pinjaman Kas</h4><div class="text-[9px] font-bold text-slate-400 uppercase">${item.dateStr}</div></div>${badge}</div><div class="text-xl font-black text-slate-800 tracking-tighter mb-1">${formatRupiah(item.amount)}</div><div class="text-xs text-slate-500 bg-slate-50 p-2 rounded-xl italic">"${item.reason}"</div></div>`;
            });
        }
    </script>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-6 border-b border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-hexagon text-2xl text-blue-600"></i>
            <div><h1 class="text-lg font-extrabold tracking-tight text-slate-900 leading-none">Piket & Kas</h1></div>
        </div>
        <a href="desainer.html" class="text-[10px] font-black text-slate-600 bg-slate-100 px-3 py-2 rounded-xl uppercase flex items-center gap-1"><i class="ph-fill ph-arrow-left"></i> KEMBALI</a>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-8 mt-2">
        <section>
            <div class="flex justify-between items-end mb-4 ml-1">
                <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest"><i class="ph-fill ph-broom text-orange-500"></i> Jadwal Piket Hari Ini</h2>
                <div id="tanggalHariIni" class="text-[9px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded"></div>
            </div>
            <div id="piket-list" class="space-y-3"></div>
        </section>

        <section class="bg-slate-900 p-6 rounded-[32px] shadow-xl text-white">
            <h2 class="text-xs font-black uppercase tracking-widest mb-5 flex items-center gap-2"><i class="ph-fill ph-hand-coins text-green-500 text-lg"></i> Form Kasbon</h2>
            <form id="formKasbon" onsubmit="ajukanKasbon(event)" class="space-y-4">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">Rp</span>
                    <input type="number" id="kbAmount" required placeholder="Cth: 50000" class="w-full bg-white/10 border-none rounded-2xl py-4 pl-12 pr-4 text-white text-sm font-black outline-none focus:ring-2 focus:ring-blue-500/50">
                </div>
                <div class="relative">
                    <i class="ph-fill ph-text-align-left absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="kbReason" required placeholder="Keperluan..." autocomplete="off" class="w-full bg-white/10 border-none rounded-2xl py-4 pl-10 pr-4 text-white text-xs font-bold outline-none focus:ring-2 focus:ring-blue-500/50">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition uppercase tracking-widest text-[10px] flex justify-center gap-2"><i class="ph-fill ph-paper-plane-right"></i> Kirim ke Bos</button>
            </form>
        </section>

        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-1"><i class="ph-fill ph-receipt text-lg"></i> Riwayat Kasbon Saya</h2>
            <div id="kasbon-list" class="space-y-4"></div>
        </section>
    </main>
</body>
</html>
