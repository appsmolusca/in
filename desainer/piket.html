<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piket & Kas - Molusca Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-user-select: none; user-select: none;
        }
    </style>
</head>
<body class="bg-[#FBFBFE] pb-20" onload="initApp()" oncontextmenu="return false;">
    <script>
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && ['c','u','s','p','a'].includes(e.key.toLowerCase())) e.preventDefault(); });

        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            authDomain: "appmoluscadesign.firebaseapp.com",
            databaseURL: "https://appmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appmoluscadesign",
            storageBucket: "appmoluscadesign.firebasestorage.app",
            messagingSenderId: "800709666958",
            appId: "1:800709666958:web:66f97b271f736e17c981df"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Cek Login (Bebas siapa aja bisa buka asal udah login)
        function initApp() {
            if (!localStorage.getItem('moluscaUser')) window.location.href = 'index.html';
            loadData();
        }

        // Bikin ID Hari Ini (Format: DD-MM-YYYY)
        const todayStr = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-');
        document.getElementById('tanggalHariIni').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        function loadData() {
            // Load User List untuk form select Kas
            db.ref('users').once('value', snap => {
                const assigneeSelect = document.getElementById('kasUser');
                assigneeSelect.innerHTML = '';
                if (snap.exists()) {
                    Object.values(snap.val()).forEach(user => {
                        if(user.role !== 'admin') assigneeSelect.innerHTML += `<option value="${user.name}">${user.name}</option>`;
                    });
                }
            });

            // Load Absen Piket Hari Ini
            db.ref('piket/' + todayStr).on('value', snap => {
                const piketData = snap.val() || {};
                renderPiket(piketData);
            });

            // Load Data Kas
            db.ref('kas').on('value', snap => {
                const kasData = snap.val();
                renderKas(kasData ? Object.values(kasData) : []);
            });
        }

        // FUNGSI ABSEN PIKET
        function updatePiket(name, status) {
            db.ref(`piket/${todayStr}/${name}`).set(status);
        }

        function renderPiket(piketData) {
            const list = document.getElementById('piket-list');
            list.innerHTML = '';
            
            // Hardcode nama tim desainer (Bisa disesuaikan jika nambah)
            const team = ['Indah', 'Nayla', 'Tya', 'Dadan']; 

            team.forEach(name => {
                let status = piketData[name] || 'belum';
                
                let btnGroup = '';
                if (status === 'belum') {
                    btnGroup = `
                        <div class="flex gap-2">
                            <button onclick="updatePiket('${name}', 'sudah')" class="bg-green-100 hover:bg-green-200 text-green-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 transition"><i class="ph-fill ph-broom"></i> Sudah Piket</button>
                            <button onclick="updatePiket('${name}', 'denda')" class="bg-red-100 hover:bg-red-200 text-red-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 transition"><i class="ph-fill ph-warning-circle"></i> Denda 5k</button>
                        </div>
                    `;
                } else if (status === 'sudah') {
                    btnGroup = `<div class="flex items-center gap-2"><span class="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1"><i class="ph-fill ph-check-circle"></i> AMAN</span> <button onclick="updatePiket('${name}', 'belum')" class="text-slate-300 hover:text-slate-500"><i class="ph-fill ph-arrow-counter-clockwise"></i></button></div>`;
                } else if (status === 'denda') {
                    btnGroup = `<div class="flex items-center gap-2"><span class="bg-red-500 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1"><i class="ph-fill ph-money"></i> BAYAR 5.000</span> <button onclick="updatePiket('${name}', 'belum')" class="text-slate-300 hover:text-slate-500"><i class="ph-fill ph-arrow-counter-clockwise"></i></button></div>`;
                }

                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center flex-wrap gap-3">
                        <h4 class="font-black text-slate-700 flex items-center gap-2"><i class="ph-fill ph-user-circle text-blue-500 text-2xl"></i> ${name}</h4>
                        ${btnGroup}
                    </div>
                `;
            });
        }

        // FUNGSI PINJAMAN KAS
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }

        async function ajukanKas(e) {
            e.preventDefault();
            const id = Date.now();
            const data = {
                id: id,
                name: document.getElementById('kasUser').value,
                amount: parseInt(document.getElementById('kasAmount').value),
                dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }),
                status: 'Belum Lunas'
            };
            db.ref('kas/' + id).set(data);
            document.getElementById('kasForm').reset();
        }

        function lunasKas(id) {
            if(confirm("Tandai pinjaman kas ini sudah LUNAS?")) {
                db.ref('kas/' + id).remove(); // Hapus data setelah lunas biar bersih
            }
        }

        function renderKas(kasData) {
            const list = document.getElementById('kas-list');
            list.innerHTML = '';
            
            if (kasData.length === 0) {
                list.innerHTML = `<div class="text-center p-6 bg-slate-50 rounded-2xl border border-dashed border-slate-200 text-slate-400 font-bold text-xs">Yeay! Tidak ada yang bon kas. 🎉</div>`;
                return;
            }

            kasData.reverse().forEach(kas => {
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                        <div>
                            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1"><i class="ph ph-calendar-blank"></i> ${kas.dateStr}</div>
                            <h4 class="font-black text-slate-900">${kas.name}</h4>
                            <div class="text-lg font-black text-orange-500 tracking-tighter">${formatRupiah(kas.amount)}</div>
                        </div>
                        <button onclick="lunasKas('${kas.id}')" class="bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-3 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 transition"><i class="ph-fill ph-check-circle"></i> LUNAS</button>
                    </div>
                `;
            });
        }
    </script>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-6 border-b border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-hexagon text-2xl text-blue-600"></i>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight text-slate-900 leading-none">Molusca<span class="text-blue-600">.</span></h1>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Piket & Kas</span>
            </div>
        </div>
        <button onclick="window.history.back()" class="text-[10px] font-black text-slate-600 bg-slate-100 px-3 py-2 rounded-xl uppercase hover:bg-slate-200 flex items-center gap-1"><i class="ph-fill ph-arrow-left"></i> KEMBALI</button>
    </header>

    <main class="p-4 max-w-2xl mx-auto space-y-10 mt-2">
        
        <section>
            <div class="flex justify-between items-end mb-4 ml-1">
                <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest flex items-center gap-2"><i class="ph-fill ph-broom text-blue-500 text-xl"></i> Absen Piket</h2>
                <div id="tanggalHariIni" class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md"></div>
            </div>
            <div id="piket-list" class="space-y-3">
                </div>
        </section>

        <section class="bg-slate-900 p-6 rounded-[32px] shadow-xl shadow-slate-200">
            <h2 class="text-xs font-black text-white uppercase tracking-widest mb-5 flex items-center gap-2"><i class="ph-fill ph-wallet text-orange-400 text-lg"></i> Pinjam Kas</h2>
            <form id="kasForm" onsubmit="ajukanKas(event)" class="space-y-4">
                <div class="flex gap-3">
                    <div class="relative w-1/2">
                        <i class="ph-fill ph-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <select id="kasUser" class="w-full bg-white/10 border-none rounded-2xl py-4 pl-10 pr-4 text-white text-xs font-bold outline-none appearance-none">
                            </select>
                    </div>
                    <div class="relative w-1/2">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">Rp</span>
                        <input type="number" id="kasAmount" required placeholder="50000" class="w-full bg-white/10 border-none rounded-2xl py-4 pl-10 pr-4 text-white text-xs font-bold outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                </div>
                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl transition uppercase tracking-widest text-[10px] flex justify-center items-center gap-2"><i class="ph-fill ph-plus-circle"></i> Tambah Tagihan Kas</button>
            </form>
        </section>

        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-1 flex items-center gap-2"><i class="ph-fill ph-receipt text-lg"></i> Kas Belum Lunas</h2>
            <div id="kas-list" class="space-y-3">
                </div>
        </section>

    </main>
</body>
</html>
