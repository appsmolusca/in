<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Desainer - PT Dakreativ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center border-b-4 border-pink-500">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Workspace Desainer</h1>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm font-bold text-gray-600 hidden md:inline">Login Sebagai:</span>
            <select id="userSelector" onchange="changeUser()" class="border border-gray-300 rounded-lg p-1.5 bg-white font-bold text-pink-600 outline-none shadow-sm">
                <option value="Indah">Indah</option>
                <option value="Nayla">Nayla</option>
                <option value="Tya">Tya</option>
            </select>
        </div>
    </header>

    <main class="p-6 max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b pb-2">
            <h2 class="text-xl font-bold">Daftar Pekerjaan Saya</h2>
            <a href="dashboard.html" class="text-xs text-gray-400 hover:text-gray-700 font-medium">← Ke Dashboard Utama</a>
        </div>

        <div id="my-tasks" class="space-y-4">
            </div>
    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('dakreativTasks')) || [];
        let currentUser = document.getElementById('userSelector').value;

        function changeUser() {
            currentUser = document.getElementById('userSelector').value;
            renderMyTasks();
        }

        function updateStatus(taskId, newStatus) {
            const index = tasks.findIndex(t => t.id === taskId);
            if(index !== -1) {
                tasks[index].status = newStatus;
                localStorage.setItem('dakreativTasks', JSON.stringify(tasks));
                renderMyTasks();
            }
        }

        function renderMyTasks() {
            const container = document.getElementById('my-tasks');
            container.innerHTML = '';

            // Filter tugas hanya untuk user yang sedang aktif
            const myTasks = tasks.filter(t => t.assignee === currentUser);

            if (myTasks.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">Belum ada tugas untuk ${currentUser}.</p>`;
                return;
            }

            myTasks.forEach(task => {
                const card = document.createElement('div');
                
                // Efek visual jika tugas sudah Final (dicoret & agak transparan)
                let opacityClass = task.status === 'Final' ? 'opacity-60 bg-gray-50' : 'bg-white';
                let titleClass = task.status === 'Final' ? 'line-through text-gray-400' : 'text-gray-800';
                
                card.className = `${opacityClass} p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:shadow-md transition`;
                
                // Styling warna dropdown berdasarkan status
                let statusColor = "text-blue-600 bg-blue-50 border-blue-200";
                if(task.status === 'Nunggu Revisi') statusColor = "text-red-600 bg-red-50 border-red-200";
                if(task.status === 'Tinggal Layout') statusColor = "text-orange-600 bg-orange-50 border-orange-200";
                if(task.status === 'Final') statusColor = "text-green-700 bg-green-50 border-green-200";

                // Badge Urgent
                let priorityBadge = task.priority === 'Urgent' 
                    ? '<span class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-[10px] font-bold border border-red-200 ml-2">🔴 URGENT</span>' 
                    : '';

                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="text-xs font-bold text-gray-400 mb-1 flex items-center">
                            📅 ${task.dateStr} | ⏰ ${task.timeAssigned} WIB
                            ${priorityBadge}
                        </div>
                        <h3 class="font-bold text-lg mb-1 ${titleClass}">${task.title}</h3>
                        <div class="text-[11px] text-gray-500">Dikirim oleh: <span class="font-bold text-gray-700">${task.sender || '-'}</span></div>
                    </div>
                    <div class="w-full md:w-48 shrink-0">
                        <select onchange="updateStatus(${task.id}, this.value)" class="w-full font-bold text-sm rounded-lg p-2 border outline-none cursor-pointer ${statusColor}">
                            <option value="Lagi Dikerjain" ${task.status === 'Lagi Dikerjain' ? 'selected' : ''}>⏳ Lagi Dikerjain</option>
                            <option value="Nunggu Revisi" ${task.status === 'Nunggu Revisi' ? 'selected' : ''}>✍️ Nunggu Revisi</option>
                            <option value="Tinggal Layout" ${task.status === 'Tinggal Layout' ? 'selected' : ''}>🧩 Tinggal Layout</option>
                            <option value="Final" ${task.status === 'Final' ? 'selected' : ''}>✅ Final</option>
                        </select>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Render pertama kali
        renderMyTasks();

        // Auto sinkronisasi jika Bos/Lead nambahin tugas di tab sebelah
        window.addEventListener('storage', () => {
            tasks = JSON.parse(localStorage.getItem('dakreativTasks')) || [];
            renderMyTasks();
        });
    </script>
</body>
</html>
