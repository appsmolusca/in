<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>Workspace Desainer - PT Dakreativ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50" onload="initApp()">
    <script>
        // === KODE FIREBASE KANG DADAN ===
        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            authDomain: "appsmoluscadesign.firebaseapp.com",
            databaseURL: "https://appsmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appsmoluscadesign",
            storageBucket: "appsmoluscadesign.firebasestorage.app",
            messagingSenderId: "800709666958",
            appId: "1:800709666958:web:66f97b271f736e17c981df",
            measurementId: "G-ZPZYPGX55H"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('dakreativUser');
        function initApp() {
            if(!currentUser || currentUser === 'admin') window.location.href = 'index.html';
            document.getElementById('userName').innerText = currentUser;
            loadMyTasks();
        }

        function loadMyTasks() {
            db.ref('tasks').on('value', (snapshot) => {
                const data = snapshot.val();
                const tasks = data ? Object.values(data).filter(t => t.assignee === currentUser) : [];
                renderTasks(tasks);
            });
        }

        function updateStatus(id, status) { db.ref('tasks/' + id).update({ status: status }); }

        async function sendPrintilan(e) {
            e.preventDefault();
            const taskId = Date.now();
            const data = {
                id: taskId, joCode: 'EXTRA', title: document.getElementById('pTitle').value,
                sender: currentUser + ' (Inisiatif)', priority: 'Normal', assignee: currentUser,
                dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }),
                timeAssigned: new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0'),
                status: 'Lagi Dikerjain', isPrintilan: true, isApproved: false
            };
            db.ref('tasks/' + taskId).set(data);
            document.getElementById('pTitle').value = '';
        }

        function logout() { localStorage.removeItem('dakreativUser'); window.location.href = 'index.html'; }

        function renderTasks(myTasks) {
            const active = document.getElementById('active-list');
            const final = document.getElementById('final-list');
            active.innerHTML = ''; final.innerHTML = '';

            myTasks.reverse().forEach(task => {
                const card = document.createElement('div');
                let badge = (task.isPrintilan && !task.isApproved) ? '<div class="text-[10px] bg-yellow-400 font-bold px-2 py-0.5 rounded mb-2 inline-block">MENUNGGU APPROVAL LEAD</div>' : '';
                let jo = `<span class="bg-blue-100 text-blue-800 px-2 rounded font-black mr-2 uppercase tracking-tighter">#${task.joCode}</span>`;

                if(task.status === 'Final') {
                    card.className = "bg-white p-3 rounded-xl border border-gray-200 text-sm flex justify-between items-center shadow-sm opacity-60";
                    card.innerHTML = `<span class="font-medium text-gray-500">${jo} ${task.title}</span> <span class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded">FINAL</span>`;
                    final.appendChild(card);
                } else {
                    let statusColor = "text-blue-600 bg-blue-50 border-blue-200";
                    if(task.status === 'Nunggu Revisi') statusColor = "text-red-600 bg-red-50 border-red-200";
                    if(task.status === 'Tinggal Layout') statusColor = "text-orange-600 bg-orange-50 border-orange-200";

                    card.className = "bg-white p-5 rounded-2xl border border-gray-200 shadow-sm flex flex-col gap-3";
                    card.innerHTML = `${badge}<div class="text-[10px] text-gray-400 font-bold">⏰ ${task.dateStr} | ${task.timeAssigned} WIB</div><h4 class="font-bold text-lg leading-tight">${jo} ${task.title}</h4><div class="text-xs text-gray-500 border-b pb-2 mb-1 italic">Dari: ${task.sender}</div><select onchange="updateStatus('${task.id}', this.value)" class="w-full border p-3 rounded-xl font-bold text-sm outline-none cursor-pointer ${statusColor}"><option value="Lagi Dikerjain" ${task.status === 'Lagi Dikerjain' ? 'selected' : ''}>⏳ Lagi Dikerjain</option><option value="Nunggu Revisi" ${task.status === 'Nunggu Revisi' ? 'selected' : ''}>✍️ Nunggu Revisi</option><option value="Tinggal Layout" ${task.status === 'Tinggal Layout' ? 'selected' : ''}>🧩 Tinggal Layout</option><option value="Final" ${task.status === 'Final' ? 'selected' : ''}>✅ Final</option></select>`;
                    active.appendChild(card);
                }
            });
        }
    </script>

    <header class="bg-white shadow p-4 flex justify-between items-center border-b-4 border-pink-500 sticky top-0 z-50">
        <div><h1 class="font-black text-gray-900 tracking-tight">WORKSPACE: <span id="userName" class="text-pink-600">...</span></h1></div>
        <button onclick="logout()" class="text-xs bg-red-100 text-red-600 px-3 py-1.5 rounded-lg font-bold hover:bg-red-200">Logout</button>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-8">
        <section class="bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-inner">
            <h3 class="text-[10px] font-bold text-blue-400 uppercase mb-2 ml-1">Lapor Kerjaan Printilan</h3>
            <form onsubmit="sendPrintilan(event)" class="flex gap-2">
                <input type="text" id="pTitle" required placeholder="Contoh: Revisi teks brosur..." class="flex-grow p-3 text-sm rounded-xl border border-blue-200 outline-none focus:ring-2 focus:ring-blue-300">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl text-sm font-bold transition shadow-md shadow-blue-200">LAPOR</button>
            </form>
        </section>

        <div>
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 ml-1">⏳ Pekerjaan Aktif</h3>
            <div id="active-list" class="space-y-5"></div>
        </div>
        
        <div class="pt-8">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4 ml-1 border-t pt-6">✅ Selesai Hari Ini</h3>
            <div id="final-list" class="space-y-3"></div>
        </div>
    </main>
</body>
</html>
