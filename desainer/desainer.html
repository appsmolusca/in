<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>Designer Workspace - PT Dakreativ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50" onload="initApp()">
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            authDomain: "appsmoluscadesign.firebaseapp.com",
            databaseURL: "https://appsmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appsmoluscadesign",
            storageBucket: "appsmoluscadesign.firebasestorage.app",
            messagingSenderId: "800709666958",
            appId: "1:800709666958:web:66f97b271f736e17c981df"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('dakreativUser');
        function initApp() {
            if(!currentUser || currentUser === 'admin') window.location.href = 'index.html';
            document.getElementById('userName').innerText = currentUser;
            loadMyTasks();
        }

        function loadMyTasks() {
            db.ref('tasks').on('value', (snapshot) => {
                const data = snapshot.val();
                const tasks = data ? Object.values(data).filter(t => t.assignee === currentUser) : [];
                renderTasks(tasks);
            });
        }

        function updateStatus(id, status) { db.ref('tasks/' + id).update({ status: status }); }

        async function sendPrintilan(e) {
            e.preventDefault();
            const taskId = Date.now();
            const data = {
                id: taskId, joCode: 'EXTRA', title: document.getElementById('pTitle').value,
                sender: currentUser, priority: 'Normal', assignee: currentUser,
                dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }),
                timeAssigned: new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0'),
                status: 'Lagi Dikerjain', isPrintilan: true, isApproved: false
            };
            db.ref('tasks/' + taskId).set(data);
            document.getElementById('pTitle').value = '';
        }

        function logout() { localStorage.removeItem('dakreativUser'); window.location.href = 'index.html'; }

        function renderTasks(myTasks) {
            const active = document.getElementById('active-list');
            const final = document.getElementById('final-list');
            active.innerHTML = ''; final.innerHTML = '';

            myTasks.reverse().forEach(task => {
                const card = document.createElement('div');
                let badge = (task.isPrintilan && !task.isApproved) ? '<div class="text-[9px] bg-yellow-400 font-bold px-2 py-0.5 rounded-md mb-2 inline-block border border-yellow-500 uppercase tracking-tighter">Waiting Approval</div>' : '';
                let jo = `<span class="bg-blue-100 text-blue-900 px-2 rounded-md font-black mr-2 uppercase text-[11px]">#${task.joCode}</span>`;

                if(task.status === 'Final') {
                    card.className = "bg-white p-4 rounded-2xl border border-gray-100 text-sm flex justify-between items-center shadow-sm opacity-60";
                    card.innerHTML = `<span class="font-bold text-gray-500">${jo} ${task.title}</span> <span class="text-[9px] font-black text-green-700 bg-green-100 px-2 py-1 rounded-md uppercase">Final</span>`;
                    final.appendChild(card);
                } else {
                    let statusColor = "text-blue-600 bg-blue-50 border-blue-200";
                    if(task.status === 'Nunggu Revisi') statusColor = "text-red-600 bg-red-50 border-red-200";
                    if(task.status === 'Tinggal Layout') statusColor = "text-orange-600 bg-orange-50 border-orange-200";

                    card.className = "bg-white p-6 rounded-3xl border border-gray-100 shadow-sm flex flex-col gap-3";
                    card.innerHTML = `
                        ${badge}
                        <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">⏰ ${task.dateStr} | ${task.timeAssigned} WIB</div>
                        <h4 class="font-black text-xl leading-tight tracking-tighter text-gray-900">${jo} ${task.title}</h4>
                        <div class="text-xs text-gray-400 border-b border-dashed pb-3 mb-1">Dari: <span class="font-bold text-gray-700">${task.sender}</span></div>
                        <select onchange="updateStatus('${task.id}', this.value)" class="w-full border p-4 rounded-2xl font-black text-sm outline-none cursor-pointer transition ${statusColor}">
                            <option value="Lagi Dikerjain" ${task.status === 'Lagi Dikerjain' ? 'selected' : ''}>⏳ Lagi Dikerjain</option>
                            <option value="Nunggu Revisi" ${task.status === 'Nunggu Revisi' ? 'selected' : ''}>✍️ Nunggu Revisi</option>
                            <option value="Tinggal Layout" ${task.status === 'Tinggal Layout' ? 'selected' : ''}>🧩 Tinggal Layout</option>
                            <option value="Final" ${task.status === 'Final' ? 'selected' : ''}>✅ Final</option>
                        </select>`;
                    active.appendChild(card);
                }
            });
        }
    </script>

    <header class="bg-white shadow p-4 flex justify-between items-center border-b-4 border-pink-500 sticky top-0 z-50">
        <div><h1 class="font-black text-gray-900 uppercase text-xs tracking-widest">Designer: <span id="userName" class="text-pink-600">...</span></h1></div>
        <button onclick="logout()" class="text-[10px] bg-red-100 text-red-600 px-3 py-2 rounded-xl font-black hover:bg-red-200 uppercase tracking-widest">Logout</button>
    </header>

    <main class="p-6 max-w-4xl mx-auto space-y-10">
        <section class="bg-blue-600 p-6 rounded-3xl shadow-xl shadow-blue-100">
            <h3 class="text-[10px] font-black text-blue-100 uppercase mb-3 tracking-widest">Lapor Tugas Printilan</h3>
            <form onsubmit="sendPrintilan(event)" class="flex gap-3">
                <input type="text" id="pTitle" required placeholder="Apa yang dikerjakan?..." class="flex-grow p-4 text-sm rounded-2xl border-none outline-none focus:ring-4 focus:ring-blue-400">
                <button class="bg-white text-blue-700 px-8 py-2 rounded-2xl text-xs font-black transition shadow-lg uppercase">Lapor</button>
            </form>
        </section>

        <div>
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 ml-2">⏳ Active Projects</h3>
            <div id="active-list" class="space-y-6"></div>
        </div>
        
        <div class="pt-10 border-t border-gray-200">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 ml-2">✅ Completed</h3>
            <div id="final-list" class="space-y-4"></div>
        </div>
    </main>
</body>
</html>
