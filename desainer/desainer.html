<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Desainer - Molusca </title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center border-b-4 border-pink-500">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Workspace Desainer</h1>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm font-bold text-gray-600 hidden md:inline">Login Sebagai:</span>
            <select id="userSelector" onchange="changeUser()" class="border border-gray-300 rounded-lg p-1.5 bg-white font-bold text-pink-600 outline-none shadow-sm">
                <option value="Indah">Indah</option>
                <option value="Nayla">Nayla</option>
                <option value="Tya">Tya</option>
            </select>
        </div>
    </header>

    <main class="p-6 max-w-4xl mx-auto space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b pb-4">
            <a href="dashboard.html" class="text-xs bg-gray-200 text-gray-700 px-3 py-1.5 rounded-md hover:bg-gray-300 font-medium">← Ke Dashboard Utama</a>
            
            <form id="printilanForm" class="flex gap-2 w-full md:w-auto bg-blue-50 p-2 rounded-lg border border-blue-200">
                <input type="text" id="printilanTitle" required placeholder="Input kerjaan printilan..." class="text-sm border border-gray-300 rounded-md p-2 outline-none focus:border-blue-500 flex-grow w-full md:w-64">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-2 px-4 rounded-md shadow-sm">Lapor</button>
            </form>
        </div>

        <section>
            <h2 class="text-lg font-bold mb-4 text-gray-800">⏳ Pekerjaan Aktif</h2>
            <div id="my-active-tasks" class="space-y-4">
                </div>
        </section>

        <section class="mt-8 pt-6 border-t border-dashed border-gray-300">
            <h2 class="text-lg font-bold mb-4 text-green-700">✅ Riwayat Pekerjaan Selesai (Final)</h2>
            <div id="my-final-tasks" class="space-y-3">
                </div>
        </section>

    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('dakreativTasks')) || [];
        let currentUser = document.getElementById('userSelector').value;

        function changeUser() {
            currentUser = document.getElementById('userSelector').value;
            renderMyTasks();
        }

        // FUNGSI INPUT KERJAAN PRINTILAN
        document.getElementById('printilanForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const now = new Date();
            const newTask = {
                id: Date.now(),
                joCode: 'EXTRA', // Kode otomatis untuk printilan
                title: document.getElementById('printilanTitle').value,
                sender: currentUser + ' (Inisiatif)',
                priority: 'Normal',
                assignee: currentUser,
                dateStr: now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }),
                timeAssigned: now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0'),
                status: 'Lagi Dikerjain',
                isPrintilan: true,
                isApproved: false // Butuh approval Bos/Lead
            };
            tasks.unshift(newTask);
            localStorage.setItem('dakreativTasks', JSON.stringify(tasks));
            renderMyTasks();
            document.getElementById('printilanTitle').value = '';
        });

        function updateStatus(taskId, newStatus) {
            const index = tasks.findIndex(t => t.id === taskId);
            if(index !== -1) {
                tasks[index].status = newStatus;
                localStorage.setItem('dakreativTasks', JSON.stringify(tasks));
                renderMyTasks();
            }
        }

        function renderMyTasks() {
            const activeContainer = document.getElementById('my-active-tasks');
            const finalContainer = document.getElementById('my-final-tasks');
            
            activeContainer.innerHTML = '';
            finalContainer.innerHTML = '';

            const myTasks = tasks.filter(t => t.assignee === currentUser);

            if (myTasks.length === 0) {
                activeContainer.innerHTML = `<p class="text-gray-400 text-sm italic">Belum ada tugas.</p>`;
            }

            myTasks.forEach(task => {
                const card = document.createElement('div');
                let priorityBadge = task.priority === 'Urgent' ? '<span class="bg-red-100 text-red-600 px-1.5 py-0.5 rounded text-[10px] font-bold border border-red-200 ml-2">🔴 URGENT</span>' : '';
                let joBadge = task.joCode ? `<span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded text-[11px] mr-2 border border-blue-200 font-extrabold uppercase">#${task.joCode}</span>` : '';
                
                // Peringatan jika printilan belum diapprove
                let approvalWarning = (task.isPrintilan && !task.isApproved) 
                    ? `<div class="bg-yellow-100 text-yellow-800 text-[10px] px-2 py-1 rounded font-bold mb-2 inline-block border border-yellow-300">⚠️ Menunggu Approval Lead</div>` 
                    : '';

                if (task.status === 'Final') {
                    // RENDER KE KOTAK FINAL
                    card.className = "bg-green-50 p-4 rounded-xl shadow-sm border border-green-200 flex flex-col md:flex-row justify-between items-center gap-3 opacity-70 hover:opacity-100 transition";
                    card.innerHTML = `
                        <div class="w-full">
                            <h3 class="font-bold text-sm text-gray-600 line-through">${joBadge} ${task.title}</h3>
                            <div class="text-[11px] text-gray-500 mt-1">📅 ${task.dateStr} | Selesai</div>
                        </div>
                        <select onchange="updateStatus(${task.id}, this.value)" class="w-full md:w-32 font-bold text-xs rounded p-1.5 border border-green-300 bg-white outline-none cursor-pointer text-green-700">
                            <option value="Final" selected>✅ Final</option>
                            <option value="Lagi Dikerjain">Balik ke Proses</option>
                        </select>
                    `;
                    finalContainer.appendChild(card);
                } else {
                    // RENDER KE KOTAK AKTIF
                    let statusColor = "text-blue-600 bg-blue-50 border-blue-200";
                    if(task.status === 'Nunggu Revisi') statusColor = "text-red-600 bg-red-50 border-red-200";
                    if(task.status === 'Tinggal Layout') statusColor = "text-orange-600 bg-orange-50 border-orange-200";

                    card.className = "bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row justify-between gap-4";
                    card.innerHTML = `
                        <div class="flex-grow">
                            ${approvalWarning}
                            <div class="text-[11px] font-bold text-gray-400 mb-1 flex items-center">
                                📅 ${task.dateStr} | ⏰ ${task.timeAssigned} WIB ${priorityBadge}
                            </div>
                            <h3 class="font-bold text-lg mb-1 leading-tight text-gray-800">${joBadge} ${task.title}</h3>
                            <div class="text-[12px] text-gray-500 mt-1">Dari: <span class="font-bold text-gray-700">${task.sender || '-'}</span></div>
                        </div>
                        <div class="w-full md:w-48 shrink-0 flex items-center">
                            <select onchange="updateStatus(${task.id}, this.value)" class="w-full font-bold text-sm rounded-lg p-2.5 border outline-none cursor-pointer shadow-sm ${statusColor}">
                                <option value="Lagi Dikerjain" ${task.status === 'Lagi Dikerjain' ? 'selected' : ''}>⏳ Lagi Dikerjain</option>
                                <option value="Nunggu Revisi" ${task.status === 'Nunggu Revisi' ? 'selected' : ''}>✍️ Nunggu Revisi</option>
                                <option value="Tinggal Layout" ${task.status === 'Tinggal Layout' ? 'selected' : ''}>🧩 Tinggal Layout</option>
                                <option value="Final" ${task.status === 'Final' ? 'selected' : ''}>✅ Final</option>
                            </select>
                        </div>
                    `;
                    activeContainer.appendChild(card);
                }
            });
        }

        renderMyTasks();
        window.addEventListener('storage', () => {
            tasks = JSON.parse(localStorage.getItem('dakreativTasks')) || [];
            renderMyTasks();
        });
    </script>
</body>
</html>
