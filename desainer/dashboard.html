<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>Lead Dashboard - PT Dakreativ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 pb-20" onload="checkLogin()">
    <script>
        // FIREBASE CONFIG - APPSMOLUSCADESIGN
        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            authDomain: "appsmoluscadesign.firebaseapp.com",
            databaseURL: "https://appsmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appsmoluscadesign",
            storageBucket: "appsmoluscadesign.firebasestorage.app",
            messagingSenderId: "800709666958",
            appId: "1:800709666958:web:66f97b271f736e17c981df"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkLogin() {
            if (localStorage.getItem('dakreativUser') !== 'admin') window.location.href = 'index.html';
            loadData();
        }

        async function sendTask(e) {
            e.preventDefault();
            const taskId = Date.now();
            const taskData = {
                id: taskId,
                joCode: document.getElementById('taskJO').value.toUpperCase(),
                title: document.getElementById('taskTitle').value,
                sender: document.getElementById('taskSender').value,
                priority: document.getElementById('taskPriority').value,
                assignee: document.getElementById('assignee').value,
                dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }),
                timeAssigned: new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0'),
                status: 'Lagi Dikerjain',
                isPrintilan: false,
                isApproved: true
            };
            db.ref('tasks/' + taskId).set(taskData);
            document.getElementById('taskForm').reset();
            document.getElementById('taskJO').focus();
        }

        function loadData() {
            db.ref('tasks').on('value', (snapshot) => {
                const data = snapshot.val();
                renderBoard(data ? Object.values(data) : []);
            });
        }

        function approveTask(id) { db.ref('tasks/' + id).update({ isApproved: true }); }
        function rejectTask(id) { if(confirm("Hapus tugas ini?")) db.ref('tasks/' + id).remove(); }
        function logout() { localStorage.removeItem('dakreativUser'); window.location.href = 'index.html'; }

        function renderBoard(tasks) {
            const columns = { 'Indah': document.getElementById('board-Indah'), 'Nayla': document.getElementById('board-Nayla'), 'Tya': document.getElementById('board-Tya') };
            const finalBoard = document.getElementById('board-final');
            Object.values(columns).forEach(c => c.innerHTML = ''); finalBoard.innerHTML = '';

            tasks.reverse().forEach(task => {
                const card = document.createElement('div');
                let jo = `<span class="bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-[10px] font-black mr-1">#${task.joCode}</span>`;
                
                if (task.status === 'Final') {
                    card.className = "bg-white p-3 rounded-xl border border-green-200 opacity-80 text-[10px] shadow-sm";
                    card.innerHTML = `<div class="mb-1 text-gray-400 uppercase font-bold">✅ Selesai: ${task.assignee}</div><h4 class="font-bold line-through text-gray-600">${jo} ${task.title}</h4>`;
                    finalBoard.appendChild(card);
                } else {
                    let border = task.priority === 'Urgent' ? 'border-red-400 bg-red-50 ring-2 ring-red-100' : 'border-gray-200 bg-white';
                    let approval = (task.isPrintilan && !task.isApproved) ? `<div class="mt-3 flex gap-2 border-t pt-3"><button onclick="approveTask('${task.id}')" class="bg-green-600 text-white text-[10px] font-bold p-2 rounded-lg flex-1">APPROVE</button><button onclick="rejectTask('${task.id}')" class="bg-red-500 text-white text-[10px] font-bold p-2 rounded-lg flex-1 text-opacity-50 hover:text-opacity-100">❌</button></div>` : '';
                    
                    card.className = `p-4 rounded-2xl border shadow-sm transition hover:shadow-md ${border}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">📅 ${task.dateStr} | ${task.timeAssigned}</span> 
                            ${task.priority === 'Urgent' ? '<span class="text-[9px] bg-red-600 text-white px-1.5 rounded-md font-bold">URGENT</span>' : ''}
                        </div>
                        <h4 class="font-black text-gray-900 text-sm mb-1 leading-tight tracking-tight">${jo} ${task.title}</h4>
                        <div class="text-[10px] text-gray-400 border-b pb-2 mb-2 italic">Pengirim: ${task.sender}</div>
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-bold bg-gray-100 px-2 py-1 rounded-md text-gray-500 uppercase">${task.status}</span> 
                            ${task.isPrintilan ? '<span class="text-[9px] text-orange-600 font-bold tracking-widest">EXTRA</span>' : ''}
                        </div>
                        ${approval}`;
                    if(columns[task.assignee]) columns[task.assignee].appendChild(card);
                }
            });
        }
    </script>

    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center border-b-4 border-blue-800 sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-black text-gray-900">Dakreativ Management</h1>
        </div>
        <button onclick="logout()" class="text-xs bg-red-100 text-red-600 px-4 py-2 rounded-xl font-bold hover:bg-red-200 transition uppercase tracking-widest">Logout</button>
    </header>

    <main class="p-4 max-w-7xl mx-auto space-y-8">
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <form id="taskForm" onsubmit="sendTask(event)" class="flex flex-wrap gap-4 items-end">
                <div class="w-32"><label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Kode JO</label><input type="text" id="taskJO" required placeholder="JO-01" class="w-full border border-gray-300 rounded-2xl p-3 bg-gray-50 font-bold uppercase focus:ring-4 focus:ring-blue-100 outline-none text-blue-700"></div>
                <div class="flex-grow min-w-[200px]"><label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Nama Project</label><input type="text" id="taskTitle" required class="w-full border border-gray-300 rounded-2xl p-3 focus:ring-4 focus:ring-blue-100 outline-none"></div>
                <div class="w-40"><label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Pengirim</label><input type="text" id="taskSender" required class="w-full border border-gray-300 rounded-2xl p-3 focus:ring-4 focus:ring-blue-100 outline-none"></div>
                <div class="w-32"><label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Prioritas</label><select id="taskPriority" class="w-full border border-gray-300 rounded-2xl p-3 bg-white font-bold"><option value="Normal">🟢 Normal</option><option value="Urgent">🔴 Urgent</option></select></div>
                <div class="w-40"><label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Assign Ke</label><select id="assignee" class="w-full border border-gray-300 rounded-2xl p-3 bg-white font-black"><option>Indah</option><option>Nayla</option><option>Tya</option></select></div>
                <button type="submit" class="bg-blue-800 hover:bg-blue-900 text-white font-black py-3 px-8 rounded-2xl shadow-xl shadow-blue-100 transition uppercase text-sm">Kirim</button>
            </form>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-gray-100 p-6 rounded-3xl border border-gray-200"><h3 class="font-black text-gray-700 tracking-tighter mb-4 pb-2 border-b-2 border-pink-400 uppercase">INDAH</h3><div id="board-Indah" class="space-y-4"></div></div>
            <div class="bg-gray-100 p-6 rounded-3xl border border-gray-200"><h3 class="font-black text-gray-700 tracking-tighter mb-4 pb-2 border-b-2 border-purple-400 uppercase">NAYLA</h3><div id="board-Nayla" class="space-y-4"></div></div>
            <div class="bg-gray-100 p-6 rounded-3xl border border-gray-200"><h3 class="font-black text-gray-700 tracking-tighter mb-4 pb-2 border-b-2 border-teal-400 uppercase">TYA</h3><div id="board-Tya" class="space-y-4"></div></div>
        </div>

        <section class="mt-12 bg-green-50 p-6 rounded-3xl border border-green-200">
            <h2 class="font-black text-green-800 mb-4 border-b border-green-200 pb-2 uppercase text-xs tracking-widest">✅ Final Archive</h2>
            <div id="board-final" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </section>
    </main>
</body>
</html>
