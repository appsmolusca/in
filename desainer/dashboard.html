<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Manajemen - PT Dakreativ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center border-b-4 border-blue-800">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Dashboard Manajemen</h1>
            <p class="text-sm text-gray-500">Akses: Bos & Lead (Dadan)</p>
        </div>
        <a href="desainer.html" class="text-sm bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-medium hover:bg-blue-200 transition">Lihat Tampilan Desainer ➔</a>
    </header>

    <main class="p-6 max-w-7xl mx-auto space-y-8">
        
        <section class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
            <h2 class="text-lg font-bold mb-4">Berikan Tugas Baru</h2>
            <form id="taskForm" class="flex flex-wrap gap-4 items-end">
                <div class="w-32">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Kode JO</label>
                    <input type="text" id="taskJO" required placeholder="Cth: JO-001" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500 font-bold text-blue-700">
                </div>
                <div class="flex-grow min-w-[200px]">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nama Project</label>
                    <input type="text" id="taskTitle" required placeholder="Contoh: Desain Feed IG" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500">
                </div>
                <div class="w-40">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pengirim</label>
                    <input type="text" id="taskSender" required placeholder="Cth: Bos / Lead" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500">
                </div>
                <div class="w-32">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Prioritas</label>
                    <select id="taskPriority" class="w-full border border-gray-300 rounded-lg p-2.5 bg-white outline-none focus:border-blue-500 font-medium">
                        <option value="Normal">🟢 Normal</option>
                        <option value="Urgent">🔴 Urgent</option>
                    </select>
                </div>
                <div class="w-36">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pilih Desainer</label>
                    <select id="assignee" required class="w-full border border-gray-300 rounded-lg p-2.5 bg-white outline-none focus:border-blue-500">
                        <option value="Indah">Indah</option>
                        <option value="Nayla">Nayla</option>
                        <option value="Tya">Tya</option>
                    </select>
                </div>
                <button type="submit" class="bg-blue-800 hover:bg-blue-900 text-white font-bold py-2.5 px-6 rounded-lg transition shadow-md">Input Kerjaan</button>
            </form>
        </section>

        <section>
            <h2 class="text-xl font-bold mb-6 border-b pb-2 flex justify-between items-end">
                <span>Pantauan Pekerjaan Aktif (Running)</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gray-100 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-lg text-center mb-4 pb-2 border-b-2 border-pink-400">INDAH</h3>
                    <div id="board-indah" class="space-y-4"></div>
                </div>
                <div class="bg-gray-100 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-lg text-center mb-4 pb-2 border-b-2 border-purple-400">NAYLA</h3>
                    <div id="board-nayla" class="space-y-4"></div>
                </div>
                <div class="bg-gray-100 p-4 rounded-xl border border-gray-200">
                    <h3 class="font-bold text-lg text-center mb-4 pb-2 border-b-2 border-teal-400">TYA</h3>
                    <div id="board-tya" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <section class="mt-12 bg-green-50 p-6 rounded-xl border border-green-200">
            <h2 class="text-xl font-bold mb-4 border-b border-green-300 pb-2 text-green-800">✅ Pekerjaan Selesai (Final)</h2>
            <div id="board-final" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-5 gap-4">
                </div>
        </section>

    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('dakreativTasks')) || [];

        function saveAndRender() {
            localStorage.setItem('dakreativTasks', JSON.stringify(tasks));
            renderBoard();
        }

        // Fungsi Approve & Reject Printilan
        function approvePrintilan(id) {
            const index = tasks.findIndex(t => t.id === id);
            if(index !== -1) {
                tasks[index].isApproved = true;
                saveAndRender();
            }
        }

        function rejectPrintilan(id) {
            if(confirm("Tolak laporan kerjaan printilan ini? Tugas akan dihapus.")) {
                tasks = tasks.filter(t => t.id !== id);
                saveAndRender();
            }
        }

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const now = new Date();
            const newTask = {
                id: Date.now(),
                joCode: document.getElementById('taskJO').value,
                title: document.getElementById('taskTitle').value,
                sender: document.getElementById('taskSender').value,
                priority: document.getElementById('taskPriority').value,
                assignee: document.getElementById('assignee').value,
                dateStr: now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }),
                timeAssigned: now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0'),
                status: 'Lagi Dikerjain',
                isPrintilan: false, // Dari form Admin, bukan printilan
                isApproved: true // Otomatis disetujui
            };

            tasks.unshift(newTask); 
            saveAndRender();
            document.getElementById('taskJO').value = '';
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskJO').focus();
        });

        function renderBoard() {
            const boards = { 'Indah': document.getElementById('board-indah'), 'Nayla': document.getElementById('board-nayla'), 'Tya': document.getElementById('board-tya') };
            const boardFinal = document.getElementById('board-final');
            
            Object.values(boards).forEach(b => b.innerHTML = '');
            boardFinal.innerHTML = '';

            tasks.forEach(task => {
                const card = document.createElement('div');
                let priorityBadge = task.priority === 'Urgent' ? `<span class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-[10px] font-bold border border-red-200">🔴 URGENT</span>` : ``;
                let joBadge = task.joCode ? `<span class="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-[10px] mr-1 border border-blue-200 font-extrabold uppercase">#${task.joCode}</span>` : '';

                // Logika Tombol Approval untuk Printilan
                let approvalButtons = '';
                let cardBorder = task.priority === 'Urgent' ? 'border-red-400 shadow-red-100' : 'border-gray-200';
                
                if (task.isPrintilan && !task.isApproved) {
                    cardBorder = 'border-yellow-400 bg-yellow-50 shadow-yellow-100'; // Highlight kuning
                    approvalButtons = `
                        <div class="mt-3 flex gap-2 border-t border-yellow-200 pt-2">
                            <button onclick="approvePrintilan(${task.id})" class="flex-1 bg-green-600 hover:bg-green-700 text-white text-[11px] font-bold py-1.5 rounded shadow-sm">✅ Setujui</button>
                            <button onclick="rejectPrintilan(${task.id})" class="flex-1 bg-red-500 hover:bg-red-600 text-white text-[11px] font-bold py-1.5 rounded shadow-sm">❌ Tolak</button>
                        </div>
                    `;
                }

                if (task.status === 'Final') {
                    card.className = "bg-white p-3 rounded-lg shadow-sm border border-green-300 opacity-80";
                    card.innerHTML = `
                        <div class="text-[10px] text-gray-400 font-bold mb-1">✅ Oleh: ${task.assignee}</div>
                        <h4 class="font-bold text-gray-800 text-sm line-through leading-tight">${joBadge} ${task.title}</h4>
                        <div class="text-[10px] text-gray-500 mt-1">📅 ${task.dateStr} | ${task.isPrintilan ? 'Tugas Manual' : 'Tugas Resmi'}</div>
                    `;
                    boardFinal.appendChild(card);
                } else {
                    card.className = `bg-white p-3 rounded-lg shadow-sm border ${cardBorder}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <div class="text-[10px] text-gray-400 font-bold">📅 ${task.dateStr} | ⏰ ${task.timeAssigned}</div>
                            ${priorityBadge}
                        </div>
                        <h4 class="font-bold text-gray-800 text-sm mb-1 leading-tight">${joBadge} ${task.title}</h4>
                        <div class="text-[11px] text-gray-500 mb-2 border-b pb-1">Dari: <strong>${task.sender || '-'}</strong></div>
                        <div class="text-[11px] font-semibold px-2 py-1 rounded bg-gray-100 inline-block text-gray-700">Status: ${task.status}</div>
                        ${approvalButtons}
                    `;
                    if(boards[task.assignee]) boards[task.assignee].appendChild(card);
                }
            });
        }
        
        window.addEventListener('storage', () => {
            tasks = JSON.parse(localStorage.getItem('dakreativTasks')) || [];
            renderBoard();
        });

        renderBoard();
    </script>
</body>
</html>
