<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Dashboard - Dakreativ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#FBFBFE] pb-20" onload="checkLogin()">
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            authDomain: "appmoluscadesign.firebaseapp.com",
            databaseURL: "https://appmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appmoluscadesign",
            storageBucket: "appmoluscadesign.firebasestorage.app",
            messagingSenderId: "800709666958",
            appId: "1:800709666958:web:66f97b271f736e17c981df"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkLogin() {
            if (localStorage.getItem('dakreativUser') !== 'admin') window.location.href = 'index.html';
            loadData();
        }

        async function sendTask(e) {
            e.preventDefault();
            const taskId = Date.now();
            const taskData = {
                id: taskId,
                joCode: document.getElementById('taskJO').value.toUpperCase(),
                title: document.getElementById('taskTitle').value,
                sender: document.getElementById('taskSender').value,
                priority: document.getElementById('taskPriority').value,
                assignee: document.getElementById('assignee').value,
                dateStr: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }),
                timeAssigned: new Date().getHours().toString().padStart(2, '0') + ':' + new Date().getMinutes().toString().padStart(2, '0'),
                status: 'Lagi Dikerjain',
                isPrintilan: false,
                isApproved: true
            };
            db.ref('tasks/' + taskId).set(taskData);
            document.getElementById('taskForm').reset();
            document.getElementById('taskJO').focus();
        }

        function loadData() {
            db.ref('tasks').on('value', (snapshot) => {
                const data = snapshot.val();
                renderBoard(data ? Object.values(data) : []);
            });
        }

        function approveTask(id) { db.ref('tasks/' + id).update({ isApproved: true }); }
        function rejectTask(id) { if(confirm("Hapus tugas ini?")) db.ref('tasks/' + id).remove(); }
        function logout() { localStorage.removeItem('dakreativUser'); window.location.href = 'index.html'; }
    </script>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-6 border-b border-slate-100 flex justify-between items-center">
        <h1 class="text-xl font-extrabold tracking-tight text-slate-900">Dakreativ<span class="text-blue-600">.</span></h1>
        <button onclick="logout()" class="text-xs font-bold text-red-500 bg-red-50 px-4 py-2 rounded-xl">LOGOUT</button>
    </header>

    <main class="p-4 md:p-8 max-w-7xl mx-auto space-y-10">
        <section class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <h2 class="text-sm font-extrabold text-slate-900 uppercase tracking-widest mb-6">Create New Task</h2>
            <form id="taskForm" onsubmit="sendTask(event)" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" id="taskJO" required placeholder="JO CODE" class="bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold uppercase focus:ring-2 focus:ring-blue-500/20">
                <input type="text" id="taskTitle" required placeholder="PROJECT NAME" class="bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500/20 md:col-span-1">
                <input type="text" id="taskSender" required placeholder="SENDER" class="bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 focus:ring-blue-500/20">
                <select id="taskPriority" class="bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none">
                    <option value="Normal">NORMAL</option>
                    <option value="Urgent">URGENT</option>
                </select>
                <select id="assignee" class="bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold outline-none">
                    <option>Indah</option><option>Nayla</option><option>Tya</option>
                </select>
                <button type="submit" class="md:col-span-5 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200">KIRIM TUGAS</button>
            </form>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] ml-2">Indah</h3>
                <div id="board-Indah" class="space-y-4"></div>
            </div>
            <div class="space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] ml-2">Nayla</h3>
                <div id="board-Nayla" class="space-y-4"></div>
            </div>
            <div class="space-y-4">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] ml-2">Tya</h3>
                <div id="board-Tya" class="space-y-4"></div>
            </div>
        </div>

        <section class="pt-10 border-t border-slate-100">
            <h2 class="text-xs font-black text-green-500 uppercase tracking-[0.3em] mb-6">Final Archive</h2>
            <div id="board-final" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>
    </main>

    <script>
        function renderBoard(tasks) {
            const columns = { 'Indah': document.getElementById('board-Indah'), 'Nayla': document.getElementById('board-Nayla'), 'Tya': document.getElementById('board-Tya') };
            const finalBoard = document.getElementById('board-final');
            Object.values(columns).forEach(c => c.innerHTML = ''); finalBoard.innerHTML = '';

            tasks.reverse().forEach(task => {
                const card = document.createElement('div');
                let jo = `<span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg text-[10px] font-black mr-2 tracking-tighter uppercase">#${task.joCode}</span>`;
                
                if (task.status === 'Final') {
                    card.className = "bg-white p-4 rounded-2xl border border-slate-100 opacity-60 text-[11px] font-bold text-slate-400";
                    card.innerHTML = `<div class="line-through">${jo} ${task.title}</div><div class="mt-1 text-[9px] uppercase tracking-widest">${task.assignee}</div>`;
                    finalBoard.appendChild(card);
                } else {
                    let border = task.priority === 'Urgent' ? 'border-red-200 bg-red-50/30 ring-4 ring-red-500/5' : 'border-slate-100 bg-white';
                    let approval = (task.isPrintilan && !task.isApproved) ? `<div class="mt-4 flex gap-2"><button onclick="approveTask('${task.id}')" class="bg-green-500 text-white text-[10px] font-bold p-3 rounded-xl flex-1 uppercase tracking-tighter">Approve</button><button onclick="rejectTask('${task.id}')" class="bg-red-100 text-red-500 text-[10px] font-bold p-3 rounded-xl">❌</button></div>` : '';
                    
                    card.className = `p-5 rounded-[24px] border shadow-sm transition-all ${border}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${task.dateStr} | ${task.timeAssigned}</span>
                            ${task.priority === 'Urgent' ? '<span class="text-[9px] font-black text-red-500 uppercase">Urgent</span>' : ''}
                        </div>
                        <h4 class="font-extrabold text-slate-900 text-sm leading-tight mb-2">${jo} ${task.title}</h4>
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">By: ${task.sender}</div>
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-md uppercase">${task.status}</span>
                            ${task.isPrintilan ? '<span class="text-[9px] font-black text-orange-400 uppercase tracking-widest">EXTRA</span>' : ''}
                        </div>
                        ${approval}`;
                    if(columns[task.assignee]) columns[task.assignee].appendChild(card);
                }
            });
        }
    </script>
</body>
</html>
