<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Manajemen - Molusca</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <script>
        if (localStorage.getItem('dakreativUser') !== 'admin') {
            window.location.href = 'index.html';
        }
        function logoutAdmin() {
            localStorage.removeItem('dakreativUser');
            window.location.href = 'index.html';
        }
    </script>

    <header class="bg-white shadow-sm py-4 px-6 flex justify-between items-center border-b-4 border-blue-800 sticky top-0 z-50">
        <div>
            <h1 class="text-xl md:text-2xl font-bold text-gray-900 leading-tight">Dashboard Manajemen</h1>
            <p class="text-xs md:text-sm text-gray-500">Molusca • Akses Admin</p>
        </div>
        <div class="flex items-center gap-3">
            <span class="hidden md:block text-sm font-medium text-gray-400 italic">Mode: Administrator</span>
            <button onclick="logoutAdmin()" class="text-sm bg-red-100 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-200 transition shadow-sm border border-red-200">Logout</button>
        </div>
    </header>

    <main class="p-4 md:p-6 max-w-7xl mx-auto space-y-8">
        
        <section class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                Berikan Tugas Harian Baru
            </h2>
            <form id="taskForm" class="flex flex-wrap gap-4 items-end">
                <div class="w-full md:w-32">
                    <label class="block text-[10px] font-extrabold text-gray-400 uppercase mb-1">Kode JO</label>
                    <input type="text" id="taskJO" required placeholder="JO-001" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500 font-bold text-blue-700 bg-gray-50 uppercase">
                </div>
                <div class="flex-grow min-w-[200px]">
                    <label class="block text-[10px] font-extrabold text-gray-400 uppercase mb-1">Nama Project</label>
                    <input type="text" id="taskTitle" required placeholder="Contoh: Desain Brosur Dakreativ" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500">
                </div>
                <div class="w-full md:w-40">
                    <label class="block text-[10px] font-extrabold text-gray-400 uppercase mb-1">Pengirim</label>
                    <input type="text" id="taskSender" required placeholder="Cth: Bos / Lead" class="w-full border border-gray-300 rounded-lg p-2.5 outline-none focus:border-blue-500">
                </div>
                <div class="w-full md:w-32">
                    <label class="block text-[10px] font-extrabold text-gray-400 uppercase mb-1">Prioritas</label>
                    <select id="taskPriority" class="w-full border border-gray-300 rounded-lg p-2.5 bg-white outline-none focus:border-blue-500 font-medium">
                        <option value="Normal">🟢 Normal</option>
                        <option value="Urgent">🔴 Urgent</option>
                    </select>
                </div>
                <div class="w-full md:w-40">
                    <label class="block text-[10px] font-extrabold text-gray-400 uppercase mb-1">Pilih Desainer</label>
                    <select id="assignee" required class="w-full border border-gray-300 rounded-lg p-2.5 bg-white outline-none focus:border-blue-500 font-bold">
                        <option value="Indah">Indah</option>
                        <option value="Nayla">Nayla</option>
                        <option value="Tya">Tya</option>
                    </select>
                </div>
                <button type="submit" class="w-full md:w-auto bg-blue-800 hover:bg-blue-900 text-white font-bold py-2.5 px-8 rounded-lg transition shadow-lg shadow-blue-200">Kirim Tugas</button>
            </form>
        </section>

        <section>
            <div class="flex justify-between items-end mb-6 border-b pb-2">
                <h2 class="text-xl font-bold text-gray-900">Pekerjaan Sedang Berjalan (Active)</h2>
                <span class="text-[10px] md:text-xs text-gray-400 italic">Pekerjaan akan otomatis hilang jika status "Final"</span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b-2 border-pink-400">
                        <h3 class="font-extrabold text-gray-700 tracking-widest uppercase">INDAH</h3>
                        <span id="count-Indah" class="bg-pink-200 text-pink-700 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div id="board-Indah" class="space-y-4"></div>
                </div>

                <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b-2 border-purple-400">
                        <h3 class="font-extrabold text-gray-700 tracking-widest uppercase">NAYLA</h3>
                        <span id="count-Nayla" class="bg-purple-200 text-purple-700 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div id="board-Nayla" class="space-y-4"></div>
                </div>

                <div class="bg-gray-100 p-4 rounded-2xl border border-gray-200">
                    <div class="flex justify-between items-center mb-4 pb-2 border-b-2 border-teal-400">
                        <h3 class="font-extrabold text-gray-700 tracking-widest uppercase">TYA</h3>
                        <span id="count-Tya" class="bg-teal-200 text-teal-700 text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div id="board-Tya" class="space-y-4"></div>
                </div>
            </div>
        </section>

        <section class="mt-12 bg-green-50 p-6 rounded-2xl border border-green-200 shadow-inner">
            <h2 class="text-xl font-bold mb-4 border-b border-green-300 pb-2 text-green-800 flex items-center gap-2">
                <span>✅ Riwayat Pekerjaan Final</span>
                <span id="count-Final" class="bg-green-200 text-green-700 text-[11px] font-bold px-2.5 py-0.5 rounded-full">0</span>
            </h2>
            <div id="board-final" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                </div>
        </section>

    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('dakreativTasks')) || [];

        function saveAndRender() {
            localStorage.setItem('dakreativTasks', JSON.stringify(tasks));
            renderBoard();
        }

        // FUNGSI APPROVAL UNTUK PRINTILAN (INPUT DESAINER)
        function approveTask(id) {
            const index = tasks.findIndex(t => t.id === id);
            if(index !== -1) {
                tasks[index].isApproved = true;
                saveAndRender();
            }
        }

        function rejectTask(id) {
            if(confirm("Hapus laporan kerjaan printilan ini?")) {
                tasks = tasks.filter(t => t.id !== id);
                saveAndRender();
            }
        }

        // FUNGSI INPUT DARI DASHBOARD ADMIN
        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const now = new Date();
            const newTask = {
                id: Date.now(),
                joCode: document.getElementById('taskJO').value.toUpperCase(),
                title: document.getElementById('taskTitle').value,
                sender: document.getElementById('taskSender').value,
                priority: document.getElementById('taskPriority').value,
                assignee: document.getElementById('assignee').value,
                dateStr: now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }),
                timeAssigned: now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0'),
                status: 'Lagi Dikerjain',
                isPrintilan: false,
                isApproved: true
            };

            tasks.unshift(newTask); 
            saveAndRender();
            
            // Reset Form & Fokus balik ke JO
            document.getElementById('taskJO').value = '';
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskJO').focus();
        });

        function renderBoard() {
            const columns = { 'Indah': document.getElementById('board-Indah'), 'Nayla': document.getElementById('board-Nayla'), 'Tya': document.getElementById('board-Tya') };
            const finalBoard = document.getElementById('board-final');
            const counters = { 'Indah': 0, 'Nayla': 0, 'Tya': 0, 'Final': 0 };

            // Bersihkan Papan
            Object.values(columns).forEach(c => c.innerHTML = '');
            finalBoard.innerHTML = '';

            tasks.forEach(task => {
                const card = document.createElement('div');
                
                // Badge Kode JO & Urgent
                let joBadge = task.joCode ? `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-black border border-blue-200 uppercase mr-1">#${task.joCode}</span>` : '';
                let priorityBadge = task.priority === 'Urgent' ? `<span class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-[10px] font-bold border border-red-200">🔴 URGENT</span>` : ``;

                // LOGIKA TAMPILAN TUGAS FINAL
                if (task.status === 'Final') {
                    counters['Final']++;
                    card.className = "bg-white p-3 rounded-xl shadow-sm border border-green-300 opacity-80 hover:opacity-100 transition";
                    card.innerHTML = `
                        <div class="text-[9px] text-gray-400 font-bold mb-1 uppercase tracking-tighter">✅ Oleh: ${task.assignee}</div>
                        <h4 class="font-bold text-gray-800 text-xs line-through leading-tight mb-1">${joBadge} ${task.title}</h4>
                        <div class="text-[9px] text-gray-500 italic">📅 ${task.dateStr} | Dari: ${task.sender}</div>
                    `;
                    finalBoard.appendChild(card);
                } 
                // LOGIKA TAMPILAN TUGAS RUNNING
                else {
                    if (columns[task.assignee]) {
                        counters[task.assignee]++;
                        
                        let cardBorder = task.priority === 'Urgent' ? 'border-red-400 bg-white ring-2 ring-red-50' : 'border-white bg-white shadow-sm';
                        let approvalUI = '';

                        // JIKA INI INPUT PRINTILAN DARI DESAINER (BUTUH APPROVAL)
                        if (task.isPrintilan && !task.isApproved) {
                            cardBorder = 'border-yellow-400 bg-yellow-50 shadow-md ring-2 ring-yellow-200';
                            approvalUI = `
                                <div class="mt-3 flex gap-2 border-t border-yellow-200 pt-3">
                                    <button onclick="approveTask(${task.id})" class="flex-1 bg-green-600 hover:bg-green-700 text-white text-[10px] font-black py-2 rounded shadow-sm transition">APPROVE</button>
                                    <button onclick="rejectTask(${task.id})" class="flex-1 bg-red-500 hover:bg-red-600 text-white text-[10px] font-black py-2 rounded shadow-sm transition">TOLAK</button>
                                </div>
                            `;
                        }

                        card.className = `p-4 rounded-2xl border transition hover:shadow-lg ${cardBorder}`;
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <div class="text-[10px] text-gray-400 font-bold">📅 ${task.dateStr} | ⏰ ${task.timeAssigned}</div>
                                ${priorityBadge}
                            </div>
                            <h4 class="font-bold text-gray-900 text-sm mb-1 leading-tight">${joBadge} ${task.title}</h4>
                            <div class="text-[11px] text-gray-500 mb-3 border-b border-gray-100 pb-1 italic">Dikirim Oleh: <span class="font-bold text-gray-700">${task.sender}</span></div>
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-extrabold px-2 py-1 rounded bg-gray-100 text-gray-500 border border-gray-200 uppercase">${task.status}</span>
                                ${task.isPrintilan ? '<span class="text-[10px] text-orange-600 font-bold">⚠️ PRINTILAN</span>' : ''}
                            </div>
                            ${approvalUI}
                        `;
                        columns[task.assignee].appendChild(card);
                    }
                }
            });

            // Update Semua Counter
            Object.keys(counters).forEach(key => {
                const el = document.getElementById(`count-${key}`);
                if(el) el.innerText = counters[key];
            });
        }
        
        // Listen to changes from designer side
        window.addEventListener('storage', () => {
            tasks = JSON.parse(localStorage.getItem('dakreativTasks')) || [];
            renderBoard();
        });

        // First Render
        renderBoard();
    </script>
</body>
</html>
