<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Piket & Kas Molusca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } </style>
</head>
<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen p-6" oncontextmenu="return false;">

    <div class="w-full max-w-md bg-white p-10 rounded-[32px] shadow-sm border border-gray-100 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-orange-500"></div>
        <div class="text-center mb-10 mt-2">
            <i class="ph-fill ph-broom text-5xl text-orange-500 mb-2"></i>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Molusca<span class="text-orange-500">.</span></h1>
            <p class="text-slate-400 text-[10px] mt-2 font-bold uppercase tracking-[0.3em]">Piket & Keuangan</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div class="relative">
                <i class="ph ph-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                <input type="text" id="username" required placeholder="Username (admin / tim)" autocomplete="off" class="w-full bg-slate-50 border-none rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-orange-500/20 transition-all text-slate-700 font-medium lowercase">
            </div>
            <div class="relative">
                <i class="ph ph-lock-key absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-lg"></i>
                <input type="password" id="password" required placeholder="Password" autocomplete="off" class="w-full bg-slate-50 border-none rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-orange-500/20 transition-all text-slate-700 font-medium">
            </div>
            <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-slate-200 uppercase text-xs tracking-widest flex justify-center items-center gap-2">
                Sign In <i class="ph ph-arrow-right"></i>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('keydown', function(e) { if (e.ctrlKey && ['c','u','s','p','a'].includes(e.key.toLowerCase())) e.preventDefault(); });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.toLowerCase().trim();
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('moluscaPiketUser', 'admin');
                window.location.href = 'dashboard-piket.html';
            } 
            else if (user === 'tim' && pass === 'tim123') {
                localStorage.setItem('moluscaPiketUser', 'tim');
                window.location.href = 'piket.html';
            } 
            else {
                alert('Username atau Password salah!');
            }
        });
    </script>
</body>
</html>
