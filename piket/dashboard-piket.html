<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan - Molusca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; } </style>
</head>
<body class="bg-[#FBFBFE] pb-20" onload="initApp()" oncontextmenu="return false;">
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoX3MZ0hxtL2j3ol3N_1w8ohYCdXPsUtI",
            authDomain: "appmoluscadesign.firebaseapp.com",
            databaseURL: "https://appmoluscadesign-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "appmoluscadesign",
            storageBucket: "appmoluscadesign.firebasestorage.app",
            messagingSenderId: "800709666958",
            appId: "1:800709666958:web:66f97b271f736e17c981df"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const jadwalPiket = { 1: ['Indah'], 2: ['Nazma'], 3: ['Nayla'], 4: ['Feyy'], 5: ['Dadan'], 6: ['Tya', 'Opik'], 0: [] };
        const todayStr = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-');
        const dayIndex = new Date().getDay();

        function initApp() {
            if (localStorage.getItem('moluscaPiketUser') !== 'admin') window.location.href = 'index.html';
            document.getElementById('tanggalHariIni').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            loadData();
        }

        function formatRupiah(angka) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka); }

        function loadData() {
            db.ref('kas_balance').on('value', snap => document.getElementById('saldoKas').innerText = formatRupiah(snap.val() || 0));
            db.ref('piket_log/' + todayStr).on('value', snap => renderPiket(snap.val() || {}));
            db.ref('kasbon').on('value', snap => renderKasbon(snap.val() ? Object.values(snap.val()) : []));
        }

        function beriDenda(nama) {
            if(confirm(`Beri denda Rp 5.000 ke ${nama}? Saldo kas otomatis bertambah.`)) {
                db.ref(`piket_log/${todayStr}/${nama}`).set('denda');
                db.ref('kas_balance').once('value', snap => db.ref('kas_balance').set((snap.val() || 0) + 5000));
            }
        }

        function batalDenda(nama) {
            if(confirm(`Batalkan denda ${nama}?`)) {
                db.ref(`piket_log/${todayStr}/${nama}`).remove();
                db.ref('kas_balance').once('value', snap => db.ref('kas_balance').set((snap.val() || 0) - 5000));
            }
        }

        function setujuKasbon(id) { if(confirm("Setujui kasbon ini?")) db.ref(`kasbon/${id}`).update({status: 'Disetujui'}); }
        function tolakKasbon(id) { if(confirm("Tolak kasbon ini?")) db.ref(`kasbon/${id}`).remove(); }
        function lunasKasbon(id) { if(confirm("Tandai kasbon LUNAS?")) db.ref(`kasbon/${id}`).remove(); }
        function logout() { localStorage.removeItem('moluscaPiketUser'); window.location.href = 'index.html'; }

        function renderPiket(logData) {
            const list = document.getElementById('piket-list');
            list.innerHTML = '';
            const petugas = jadwalPiket[dayIndex];
            if (petugas.length === 0) { list.innerHTML = `<div class="text-center p-4 bg-slate-50 text-slate-400 font-bold rounded-2xl">Hari ini libur piket.</div>`; return; }

            petugas.forEach(name => {
                let status = logData[name];
                let ui = '';
                if (status === 'sudah') ui = `<span class="bg-green-100 text-green-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase"><i class="ph-fill ph-check-circle"></i> Selesai</span>`;
                else if (status === 'denda') ui = `<div class="flex gap-2 items-center"><span class="bg-red-100 text-red-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase"><i class="ph-fill ph-money"></i> Didenda (+5K)</span><button onclick="batalDenda('${name}')" class="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-lg"><i class="ph-fill ph-arrow-counter-clockwise"></i></button></div>`;
                else ui = `<button onclick="beriDenda('${name}')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-md"><i class="ph-fill ph-warning-circle"></i> Denda 5.000</button>`;

                list.innerHTML += `<div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center"><h4 class="font-black text-slate-700 flex items-center gap-2"><i class="ph-fill ph-user-circle text-orange-500 text-xl"></i> ${name}</h4>${ui}</div>`;
            });
        }

        function renderKasbon(data) {
            const list = document.getElementById('kasbon-list');
            list.innerHTML = '';
            if(data.length === 0) { list.innerHTML = `<div class="text-center p-6 bg-slate-50 rounded-2xl text-slate-400 font-bold text-xs">Aman! Tidak ada pengajuan kasbon.</div>`; return; }

            data.reverse().forEach(item => {
                let btns = '';
                let badge = item.status === 'Menunggu' ? `<span class="bg-orange-100 text-orange-600 px-2 py-1 rounded text-[9px] font-black uppercase">Menunggu</span>` : `<span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[9px] font-black uppercase">Disetujui</span>`;
                
                if (item.status === 'Menunggu') {
                    btns = `<div class="flex gap-2 mt-3"><button onclick="setujuKasbon('${item.id}')" class="flex-1 bg-green-500 text-white p-2 rounded-xl text-[10px] font-black uppercase">Setuju</button><button onclick="tolakKasbon('${item.id}')" class="flex-1 bg-red-100 text-red-500 p-2 rounded-xl text-[10px] font-black uppercase">Tolak</button></div>`;
                } else {
                    btns = `<button onclick="lunasKasbon('${item.id}')" class="w-full mt-3 bg-slate-900 text-white p-3 rounded-xl text-[10px] font-black uppercase flex justify-center gap-1"><i class="ph-fill ph-seal-check"></i> Tandai Sudah Lunas</button>`;
                }

                list.innerHTML += `<div class="bg-white p-5 rounded-3xl border shadow-sm"><div class="flex justify-between items-start mb-2"><div><h4 class="font-black text-slate-900">${item.name}</h4><div class="text-[9px] font-bold text-slate-400 uppercase">${item.dateStr}</div></div>${badge}</div><div class="text-xl font-black text-slate-800 tracking-tighter mb-1">${formatRupiah(item.amount)}</div><div class="text-xs text-slate-500 bg-slate-50 p-2 rounded-xl italic">"${item.reason}"</div>${btns}</div>`;
            });
        }
    </script>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 px-6 border-b border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-wallet text-2xl text-orange-500"></i>
            <div><h1 class="text-lg font-extrabold tracking-tight text-slate-900 leading-none">Bos Kas</h1></div>
        </div>
        <button onclick="logout()" class="text-[10px] font-black text-red-500 bg-red-50 px-3 py-2 rounded-xl uppercase flex items-center gap-1 hover:bg-red-100"><i class="ph-fill ph-sign-out"></i> LOGOUT</button>
    </header>

    <main class="p-4 max-w-xl mx-auto space-y-8 mt-2">
        <section class="bg-gradient-to-br from-orange-500 to-red-600 p-6 rounded-[32px] shadow-xl text-white relative overflow-hidden">
            <i class="ph-fill ph-coins absolute -right-4 -bottom-4 text-9xl opacity-10"></i>
            <div class="relative z-10">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-orange-200 mb-1">Total Saldo Kas</h3>
                <div id="saldoKas" class="text-4xl font-black tracking-tighter">Rp 0</div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-4 ml-1">
                <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest"><i class="ph-fill ph-broom text-blue-500"></i> Pantau Piket Hari Ini</h2>
                <div id="tanggalHariIni" class="text-[9px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded"></div>
            </div>
            <div id="piket-list" class="space-y-3"></div>
        </section>

        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-4 ml-1"><i class="ph-fill ph-receipt text-lg"></i> Approval Kasbon</h2>
            <div id="kasbon-list" class="space-y-4"></div>
        </section>
    </main>
</body>
</html>
